# ─────────────────────────────────────────────
# Tmux config - optimized for Claude Code + daily use
# ─────────────────────────────────────────────

# ── Terminal & Colors ──────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Prefix ─────────────────────────────────────
# Keep Ctrl-b as prefix (default, no relearning needed)

# ── General ────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on
setw -g mode-keys vi

# ── Easy splits (intuitive keys) ──────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (Alt+arrow, no prefix) ────
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ── Pane resizing (prefix + arrow) ────────────
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# ── Window navigation (Shift+arrow, no prefix) ─
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Reload config ─────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Copy mode (vi-style) ──────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Theme: Catppuccin Mocha inspired ──────────
# Colors
BG="#1e1e2e"
SURFACE="#313244"
OVERLAY="#45475a"
TEXT="#cdd6f4"
SUBTEXT="#a6adc8"
BLUE="#89b4fa"
GREEN="#a6e3a1"
MAUVE="#cba6f7"
PEACH="#fab387"
RED="#f38ba8"
YELLOW="#f9e2af"

# ── Status bar ────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=$SURFACE,fg=$TEXT"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=$BLUE,fg=$BG,bold]  #S #[bg=$SURFACE,fg=$BLUE]"

# Right: user@host | date | time
set -g status-right-length 60
set -g status-right "#[fg=$SUBTEXT] #(whoami)@#H #[fg=$OVERLAY]| #[fg=$PEACH]%b %d #[fg=$OVERLAY]| #[fg=$GREEN]%H:%M "

# Window tabs
set -g window-status-format "#[fg=$SUBTEXT]  #I:#W  "
set -g window-status-current-format "#[bg=$OVERLAY,fg=$MAUVE,bold]  #I:#W  "
set -g window-status-separator ""

# ── Pane borders ──────────────────────────────
set -g pane-border-style "fg=$OVERLAY"
set -g pane-active-border-style "fg=$BLUE"

# ── Message & command styling ─────────────────
set -g message-style "bg=$SURFACE,fg=$PEACH,bold"
set -g mode-style "bg=$OVERLAY,fg=$MAUVE,bold"

# ── Activity ──────────────────────────────────
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=$YELLOW"
